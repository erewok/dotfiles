# Starship prompt configuration
# https://starship.rs/config/

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$line_break\
$kubernetes\
$character"""

[directory]
truncation_length = 4
truncate_to_repo = true

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
staged = "[+${count}](green)"
modified = "[~${count}](yellow)"
untracked = "[?${count}](blue)"
deleted = "[-${count}](red)"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "⎈ "
style = "bold blue"

[kubernetes.context_aliases]
# Add shorthand aliases for long context names, e.g.:
# "my-long-cluster-name" = "short"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[line_break]
disabled = false

# Disable language/toolchain version indicators — too noisy
[buf]
disabled = true
[c]
disabled = true
[golang]
disabled = true
[java]
disabled = true
[lua]
disabled = true
[nodejs]
disabled = true
[package]
disabled = true
[python]
disabled = true
[ruby]
disabled = true
[rust]
disabled = true
[terraform]
disabled = true
