# Starship prompt configuration
# https://starship.rs/config/
"$schema" = 'https://starship.rs/config-schema.json'

format = """
$kubernetes\
$cmd_duration\
$fill\
$git_branch\
$git_state\
$git_status\
$line_break\
$directory\
$character"""

[directory]
truncation_length = 4
truncate_to_repo = true

[fill]
symbol = " "

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bright-black"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕..⇡${ahead_count}⇣${behind_count}"
staged = "[^${count}](green)"
modified = "[~${count}](yellow)"
untracked = "[?${count}](blue)"
deleted = "[-${count}](red)"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "⎈ "
style = "bold blue"

[[kubernetes.contexts]]
context_pattern = "prod.*"
style = "bold red"
context_alias = "k8s-prod"

[[kubernetes.contexts]]
context_pattern = "dev.*"
style = "bold blue"
context_alias = "k8s-dev"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[line_break]
disabled = false

# Disable language/toolchain version indicators — too noisy
[buf]
disabled = true
[c]
disabled = true
[golang]
disabled = true
[java]
disabled = true
[lua]
disabled = true
[nodejs]
disabled = true
[package]
disabled = true
[python]
disabled = true
[ruby]
disabled = true
[rust]
disabled = true
[terraform]
disabled = true
